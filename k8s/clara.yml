# PIEZA 1: DISCO DURO VIRTUAL (PersistentVolumeClaim o PVC)
# Pedirle a la computadora un espacio físico que no se borre nunca, para que los expedientes y ventas del sistema CLARA sobrevivan si el contenedor muere.

apiVersion: v1                  # Versión de la API interna de K8s que maneja discos.
kind: PersistentVolumeClaim     # "Tipo de objeto": Un "Vale" o "Reclamación" de disco duro.
metadata:                       # Datos de identificación del objeto.
  name: mysql-pv-claim          # Nombre que le damos a este vale para llamarlo más adelante.
spec:                           # "Especificaciones": Cómo queremos este disco.
  accessModes:                  # Reglas de lectura/escritura.
    - ReadWriteOnce             # Significa que solo 1 contenedor a la vez puede escribir en este disco (evita corrupción de datos).
  resources:                    # Recursos físicos que estamos solicitando.
    requests:                   # Lo mínimo que le pedimos al sistema operativo.
      storage: 1Gi              # "Dame 1 Gigabyte de espacio real en mi disco duro de Windows/Linux".
---


# PIEZA 2: RED INTERNA DE LA BASE DE DATOS (Service ClusterIP)
# Crear un nombre de dominio (DNS) interno para que la API en C# pueda encontrar a la base de datos sin importar si el contenedor cambia de IP.

apiVersion: v1                  # Versión de la API para servicios de red.
kind: Service                   # "Tipo de objeto": Un enrutador de tráfico.
metadata:
  name: mysql-clara             # ¡CRÍTICO! Este será el "Server" en tu cadena de conexión de C# (Server=mysql-clara;).
spec:
  selector:                     # ¿A quién le va a mandar el tráfico este servicio?
    app: basededatos            # A cualquier contenedor que tenga la etiqueta "app: basededatos".
  ports:
    - port: 3306                # El puerto por donde el servicio va a escuchar peticiones.
  type: ClusterIP               # Tipo de red: "Solo accesible desde ADENTRO del clúster". Máxima seguridad.
---


# PIEZA 3: CONTENEDOR DE LA BASE DE DATOS (Deployment MySQL)
# Descargar MySQL, configurarlo, inyectarle el archivo Tablas.sql y conectarle el disco duro persistente.

apiVersion: apps/v1             # Versión de la API para aplicaciones (Deployments).
kind: Deployment                # "Tipo de objeto": Un administrador que asegura que el contenedor siempre esté vivo.
metadata:
  name: db-deployment           # Nombre de este administrador.
spec:
  replicas: 1                   # Queremos exactamente 1 clon (contenedor) de la base de datos corriendo siempre.
  selector:
    matchLabels:                # Regla del administrador: "Voy a vigilar a los contenedores que tengan esta etiqueta:"
      app: basededatos          # Etiqueta de vigilancia.
  template:                     # "Plantilla": El molde exacto de cómo debe nacer el contenedor.
    metadata:
      labels:                   # Le pegamos una etiqueta al contenedor en cuanto nace.
        app: basededatos        # Coincide con el selector de arriba y con el Service de la Pieza 2.
    spec:                       # Especificaciones técnicas del contenedor.
      containers:               # Lista de contenedores que van dentro de este "Pod".
      - name: mysql-container   # Nombre interno del contenedor.
        image: mysql:8.0        # Descarga la imagen oficial de MySQL versión 8.0 desde internet.
        env:                    # Variables de entorno (Configuraciones al encender).
        - name: MYSQL_ROOT_PASSWORD
          value: "KameHameH4!"  # Contraseña maestra de la base de datos.
        - name: MYSQL_DATABASE
          value: "farmacia"     # Le dice a MySQL que cree la base de datos vacía llamada "farmacia" al iniciar.
        - name: TZ
          value: "America/Monterrey" # Ajusta el reloj interno a la hora de Saltillo.
        ports:
        - containerPort: 3306   # El puerto donde MySQL escucha nativamente por dentro.

        volumeMounts:           # "Conexión de cables USB" hacia adentro del contenedor.
        - name: almacenamiento-persistente    # Toma el cable llamado "almacenamiento-persistente"...
          mountPath: /var/lib/mysql           # ...y enchúfalo en la carpeta donde MySQL guarda los datos.
        - name: script-inicializacion         # Toma el cable llamado "script-inicializacion"...
          mountPath: /docker-entrypoint-initdb.d # ...y enchúfalo en la carpeta de MySQL que lee archivos .sql al arrancar.

      volumes:                  # "De dónde vienen esos cables externos" (La fuente de los datos).
      - name: almacenamiento-persistente      # El cable 1...
        persistentVolumeClaim:
          claimName: mysql-pv-claim           # ...viene del Vale de 1GB que creamos en la Pieza 1.
      - name: script-inicializacion           # El cable 2...
        configMap:
          name: tablas-sql-config             # ...viene de la memoria RAM de K8s donde guardamos el archivo Tablas.sql.
---

# PIEZA 4: ENLACE EXTERNO PARA WINDOWS (Service NodePort)
# Objetivo: Perforar un túnel seguro en el clúster para que el frontend
# (Visual Basic en tu Windows) pueda comunicarse con la API (que está aislada).

apiVersion: v1
kind: Service
metadata:
  name: backend-clara-svc       # Nombre del túnel.
spec:
  selector:                     # ¿Hacia dónde manda el tráfico este túnel?
    app: backend                # Hacia los contenedores con la etiqueta "app: backend".
  ports:
    - port: 5133                # El puerto que abre el servicio internamente.
      targetPort: 5133          # El puerto al que se lo pasa al contenedor (tu API en C#).
      nodePort: 30000           # ¡EL AGUJERO EXTERNO! El puerto físico estático expuesto hacia tu Windows.
  type: NodePort                # Tipo de red: "Expón este servicio hacia el mundo exterior".
---


# PIEZA 5: CONTENEDOR DE TU API EN C# (Deployment API)
# Objetivo: Levantar el backend de CLARA asegurándose de usar la imagen que
# tú mismo fabricaste, sin intentar buscarla en internet.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1                   # Queremos 1 contenedor de la API corriendo.
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend            # Esta etiqueta conecta a la API con el túnel de la Pieza 4.
    spec:
      containers:
      - name: api-container
        image: api-clara:1.1    # El nombre exacto de la imagen que creaste con tu Dockerfile.
        imagePullPolicy: Never  # REGLA DE ORO: "No vayas a internet a buscar esta imagen, búscala en tu disco duro local".
        env:
        - name: TZ
          value: "America/Monterrey" # Sincroniza la hora de la API para que las ventas se registren a la hora correcta.
        ports:
        - containerPort: 5133   # El puerto por donde Kestrel (el servidor de .NET) está escuchando adentro de la caja.
